<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vapers Store</title>

    <!-- 📱 RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🔥 MODO APP -->
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 🔥 PWA -->
    <link rel="manifest" href="/static/manifest.json">

    <!-- 🔥 ICONOS (CLAVE PARA ARREGLAR LA N) -->
    <link rel="icon" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-512.png">

    <!-- 🔤 FUENTE -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- 🎨 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">

    <!-- 🔥 SERVICE WORKER (MEJORADO) -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js')
          .then(reg => console.log("SW registrado"))
          .catch(err => console.log("Error SW:", err));
      }
    </script>

    <!-- 🔥 ESTILO GLOBAL PRO -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            color: #e5e7eb;
            background: linear-gradient(135deg, #020617, #0f172a);
            margin: 0;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            color: #f9fafb;
        }

        p, span, label {
            color: #d1d5db;
        }

        a {
            text-decoration: none;
        }

        /* 🔥 NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(2,6,23,0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 600;
            font-size: 18px;
            color: #22c55e;
        }

        .content {
            padding: 10px;
        }

        /* 🔥 CARDS TEXTO */
        .container div[style*="background: white"] {
            color: #111 !important;
        }
    </style>

</head>

<body>

<div class="app">

    <nav class="navbar">
        <a href="{{ url_for('ventas') }}" class="logo">🔥 Vapers Store</a>
    </nav>

    <div class="content">

    <!-- 🔥 MENSAJES FLASH -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="padding:10px;">
          {% for m in messages %}
            <div style="
                background:#22c55e;
                color:black;
                padding:10px;
                margin-bottom:10px;
                border-radius:10px;
                font-weight:600;
                text-align:center;
            ">
              {{ m }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>
<script>
setTimeout(() => {
  const mensajes = document.querySelectorAll("div[style*='background:#22c55e']");
  mensajes.forEach(m => m.style.display = "none");
}, 3000);
</script>
</div>

</body>
</html>
