{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h2>✏️ Editar Producto</h2>

    <form method="POST" enctype="multipart/form-data" class="styled-form">

        <div class="form-group">
            <label>Nombre del Producto:</label>
            <input type="text" name="nombre"
                value="{{ producto[1] }}"
                placeholder="Dejar igual"
               formnovalidate>
        </div>

        <!-- 🔥 CATEGORÍA PRO -->
        <div class="form-group">
            <label>Categoría:</label>

            <div style="position:relative;">
                <select name="categoria" required class="select-pro">

                    <option value="Vape" {{ 'selected' if producto[2]=='Vape' else '' }}>
                        🔥 Vape
                    </option>

                    <option value="Accesorio" {{ 'selected' if producto[2]=='Accesorio' else '' }}>
                        🧩 Accesorio
                    </option>

                </select>

                <span class="arrow">▼</span>
            </div>
        </div>

       <div class="form-row">
    <div class="form-group">
        <label>Precio Compra ($):</label>
        <input type="number" step="0.01" name="precio_compra"
               value="{{ producto[3] }}"
               placeholder="Dejar igual"
               formnovalidate>
    </div>

    <div class="form-group">
        <label>Precio Venta ($):</label>
        <input type="number" step="0.01" name="precio_venta"
               value="{{ producto[4] }}"
               placeholder="Dejar igual"
               formnovalidate>
    </div>
</div>

<!-- ❌ ELIMINAMOS PRECIO MAYORISTA -->

<div class="form-group">
    <label>Cantidad en Stock:</label>
    <input type="number" name="stock"
           value="{{ producto[6] }}"
           placeholder="Dejar igual"
           formnovalidate>
</div>

<!-- 📸 IMAGEN -->
<div class="form-group">
    <label>Imagen actual:</label><br>

    {% if producto[7] %}
        <img src="{{ producto[7] }}">
             style="width:120px; border-radius:10px; margin-bottom:10px;">
    {% else %}
        <p style="color:#64748b;">📸 Sin imagen</p>
    {% endif %}

    <label>Cambiar imagen (opcional):</label>
    <input type="file" name="imagen" class="file-input">
</div>
        <div class="form-actions">
            <button type="submit" class="btn-save">💾 Guardar Cambios</button>
            <a href="/index" class="btn-cancel">Cancelar</a>
        </div>

    </form>
</div>

<style>
/* 🔥 SELECT PRO */
.select-pro{
    width:100%;
    padding:12px;
    border-radius:12px;
    background:#020617;
    color:white;
    border:1px solid #1f2937;
    appearance:none;
    outline:none;
    font-size:14px;
    transition:0.3s;
}

.select-pro:focus{
    border-color:#00ffcc;
    box-shadow:0 0 10px rgba(0,255,200,0.3);
}

/* FLECHA */
.arrow{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    color:#00ffcc;
    pointer-events:none;
}

/* OPCIONES */
select option{
    background:#020617;
    color:white;
}
</style>

{% endblock %}
