{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 400px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #1e293b;">🛒 Confirmar Venta</h2>
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

    <div style="text-align: center; margin-bottom: 20px;">
        <h3 style="margin: 0; color: #334155;">{{ producto[1] }}</h3>
        <p style="color: #64748b; margin: 5px 0;">Stock disponible: <strong>{{ producto[6] }}</strong></p>
    </div>

    <form action="{{ url_for('venta', id=producto[0]) }}" method="POST" autocomplete="off">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #475569;">Cantidad a vender:</label>
            <input type="number" name="cantidad" placeholder="Ej: 1" min="1" max="{{ producto[6] }}" required
                   style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button type="submit" class="btn" style="background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer;">
                ✅ Confirmar Venta
            </button>
            <a href="/home" style="text-align: center; text-decoration: none; color: #64748b; padding: 10px; font-size: 0.9rem;">
                Cancelar y volver
            </a>
        </div>
    </form>
</div>
{% endblock %}
